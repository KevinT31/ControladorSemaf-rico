<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Mapbox API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a202c;
            color: #e2e8f0;
        }
        .status-box {
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .success {
            background: #065f46;
            border: 2px solid #10b981;
        }
        .error {
            background: #7f1d1d;
            border: 2px solid #ef4444;
        }
        .warning {
            background: #78350f;
            border: 2px solid #f59e0b;
        }
        button {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #2563eb;
        }
        pre {
            background: #2d3748;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
        }
        h1 {
            color: #60a5fa;
        }
        .info {
            background: #1e3a8a;
            border: 2px solid #3b82f6;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h1>🗺️ Verificación de Mapbox API</h1>

    <div id="status"></div>

    <button onclick="testToken()">1. Verificar Token</button>
    <button onclick="testAPI()">2. Probar API</button>
    <button onclick="testRoute()">3. Obtener Ruta Real</button>

    <div id="results"></div>

    <script src="config.js"></script>
    <script>
        const resultsDiv = document.getElementById('results');
        const statusDiv = document.getElementById('status');

        // Verificar token al cargar
        window.onload = function() {
            if (CONFIG.MAPBOX_TOKEN === 'TU_TOKEN_MAPBOX_AQUI') {
                statusDiv.innerHTML = `
                    <div class="status-box error">
                        <h3>❌ Token no configurado</h3>
                        <p>Por favor configura tu token en <code>config.js</code></p>
                    </div>
                `;
            } else {
                statusDiv.innerHTML = `
                    <div class="status-box success">
                        <h3>✅ Token configurado</h3>
                        <p><strong>Token:</strong> ${CONFIG.MAPBOX_TOKEN.substring(0, 20)}...</p>
                        <p>Puedes proceder con las pruebas.</p>
                    </div>
                `;
            }
        };

        function testToken() {
            resultsDiv.innerHTML = '<div class="info"><h3>🔍 Verificando token...</h3></div>';

            const token = CONFIG.MAPBOX_TOKEN;

            if (token === 'TU_TOKEN_MAPBOX_AQUI') {
                resultsDiv.innerHTML = `
                    <div class="status-box error">
                        <h3>❌ Token no configurado</h3>
                        <p>Debes reemplazar 'TU_TOKEN_MAPBOX_AQUI' con tu token real.</p>
                    </div>
                `;
                return;
            }

            if (!token.startsWith('pk.')) {
                resultsDiv.innerHTML = `
                    <div class="status-box warning">
                        <h3>⚠️ Token sospechoso</h3>
                        <p>Los tokens públicos de Mapbox deben comenzar con 'pk.'</p>
                        <p>Tu token comienza con: <code>${token.substring(0, 10)}</code></p>
                    </div>
                `;
                return;
            }

            resultsDiv.innerHTML = `
                <div class="status-box success">
                    <h3>✅ Token válido</h3>
                    <p><strong>Token:</strong> ${token.substring(0, 30)}...</p>
                    <p><strong>Longitud:</strong> ${token.length} caracteres</p>
                    <p><strong>Tipo:</strong> Token público (pk.)</p>
                </div>
            `;
        }

        async function testAPI() {
            resultsDiv.innerHTML = '<div class="info"><h3>🌐 Probando conexión con API...</h3></div>';

            try {
                // Prueba simple: obtener información del usuario
                const url = `https://api.mapbox.com/v4/mapbox.mapbox-streets-v8.json?access_token=${CONFIG.MAPBOX_TOKEN}`;

                const response = await fetch(url);

                if (response.ok) {
                    resultsDiv.innerHTML = `
                        <div class="status-box success">
                            <h3>✅ API de Mapbox responde correctamente</h3>
                            <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                            <p>El token es válido y tiene acceso a la API.</p>
                        </div>
                    `;
                } else if (response.status === 401) {
                    resultsDiv.innerHTML = `
                        <div class="status-box error">
                            <h3>❌ Token no autorizado</h3>
                            <p><strong>Error 401:</strong> El token es inválido o expiró</p>
                            <p>Genera un nuevo token en: <a href="https://account.mapbox.com/access-tokens/" target="_blank">Mapbox Access Tokens</a></p>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="status-box error">
                            <h3>❌ Error de API</h3>
                            <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="status-box error">
                        <h3>❌ Error de conexión</h3>
                        <p>${error.message}</p>
                        <p>Verifica tu conexión a internet.</p>
                    </div>
                `;
            }
        }

        async function testRoute() {
            resultsDiv.innerHTML = '<div class="info"><h3>🛣️ Obteniendo ruta real...</h3><p>Probando ruta entre dos puntos de Lima...</p></div>';

            try {
                // Coordenadas de prueba en Lima (Wilson - Arequipa / Javier Prado - Aviación)
                const inicio = [-77.034, -12.094];  // lng, lat
                const fin = [-77.011, -12.090];

                const url = `${CONFIG.MAPBOX_DIRECTIONS_API}/${CONFIG.DRIVING_PROFILE}/${inicio[0]},${inicio[1]};${fin[0]},${fin[1]}` +
                            `?geometries=geojson` +
                            `&overview=full` +
                            `&steps=true` +
                            `&access_token=${CONFIG.MAPBOX_TOKEN}`;

                console.log('URL de prueba:', url);

                const response = await fetch(url);
                const data = await response.json();

                if (response.ok && data.routes && data.routes.length > 0) {
                    const route = data.routes[0];
                    const distanciaKm = (route.distance / 1000).toFixed(2);
                    const tiempoMin = (route.duration / 60).toFixed(1);
                    const puntos = route.geometry.coordinates.length;

                    resultsDiv.innerHTML = `
                        <div class="status-box success">
                            <h3>✅ Ruta obtenida exitosamente</h3>
                            <p><strong>Distancia:</strong> ${distanciaKm} km</p>
                            <p><strong>Tiempo estimado:</strong> ${tiempoMin} minutos</p>
                            <p><strong>Puntos de la ruta:</strong> ${puntos}</p>
                            <p><strong>Pasos/instrucciones:</strong> ${route.legs[0].steps.length}</p>
                            <details>
                                <summary>Ver datos completos (JSON)</summary>
                                <pre>${JSON.stringify(route, null, 2)}</pre>
                            </details>
                        </div>
                        <div class="info">
                            <h4>🎉 ¡Todo funciona correctamente!</h4>
                            <p>Las rutas de emergencia y olas verdes seguirán las calles reales del mapa.</p>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="status-box error">
                            <h3>❌ No se pudo obtener la ruta</h3>
                            <p><strong>Respuesta:</strong></p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="status-box error">
                        <h3>❌ Error al obtener ruta</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
