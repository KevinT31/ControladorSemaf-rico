<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Librerías</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Diagnóstico de Librerías CDN</h1>
    <p>Esta página verifica si tu navegador puede cargar las librerías necesarias.</p>

    <div id="results"></div>

    <!-- Intentar cargar librerías -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js" crossorigin="anonymous"></script>

    <script>
        const results = document.getElementById('results');

        function addResult(name, success, message) {
            const div = document.createElement('div');
            div.className = success ? 'status success' : 'status error';
            div.innerHTML = `<strong>${name}:</strong> ${message}`;
            results.appendChild(div);
        }

        // Esperar un poco para que las librerías se carguen
        setTimeout(() => {
            // Test Leaflet
            if (typeof L !== 'undefined') {
                addResult('Leaflet', true, 'Cargado correctamente ✓');
            } else {
                addResult('Leaflet', false, 'No se pudo cargar ✗');
            }

            // Test Chart.js
            if (typeof Chart !== 'undefined') {
                addResult('Chart.js', true, 'Cargado correctamente ✓');
            } else {
                addResult('Chart.js', false, 'No se pudo cargar ✗');
            }

            // Test Particles.js
            if (typeof particlesJS !== 'undefined') {
                addResult('Particles.js', true, 'Cargado correctamente ✓');
            } else {
                addResult('Particles.js', false, 'No se pudo cargar ✗');
            }

            // Información adicional
            const info = document.createElement('div');
            info.className = 'status info';
            info.innerHTML = `
                <strong>Información del navegador:</strong><br>
                User Agent: ${navigator.userAgent}<br>
                Cookies habilitadas: ${navigator.cookieEnabled}<br>
                Protocolo: ${window.location.protocol}
            `;
            results.appendChild(info);

            // Abrir consola para ver errores
            console.log('=== ESTADO DE LIBRERÍAS ===');
            console.log('Leaflet:', typeof L !== 'undefined' ? 'OK' : 'FALLO');
            console.log('Chart.js:', typeof Chart !== 'undefined' ? 'OK' : 'FALLO');
            console.log('Particles.js:', typeof particlesJS !== 'undefined' ? 'OK' : 'FALLO');
        }, 2000);
    </script>
</body>
</html>
